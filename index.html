<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dostyq Library</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background: linear-gradient(#020024,#090979,#000);
    color:white;
}

/* HERO */
.hero {
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:30px;
}

/* ADMIN BUTTON */
.admin-btn {
    position:fixed;
    top:10px;
    right:10px;
    background:purple;
    padding:10px;
    border-radius:50%;
    cursor:pointer;
}

/* BOOK */
.book {
    background:#111;
    margin:10px;
    padding:15px;
    border-radius:10px;
}

.book img {
    width:100%;
    border-radius:10px;
}

.detail {
    display:none;
    margin-top:10px;
}

.active {
    display:block;
}

/* ADMIN PANEL */
#admin {
    display:none;
    background:#000;
    padding:20px;
}
input, textarea {
    width:100%;
    margin:5px 0;
    padding:10px;
}
button {
    padding:10px;
    margin-top:5px;
}
.comment {
    background:#222;
    padding:5px;
    margin:5px 0;
}
</style>
</head>

<body>

<!-- ADMIN BUTTON -->
<div class="admin-btn" onclick="openAdmin()">R</div>

<!-- HERO -->
<div class="hero">
    📚 Dostyq Library
</div>

<!-- BOOK LIST -->
<div id="books"></div>

<!-- ADMIN PANEL -->
<div id="admin">
    <h2>Админ панель</h2>

    <input id="name" placeholder="Кітап аты">
    <input id="img" placeholder="Сурет ссылка">
    <input id="user" placeholder="Кім алды (немесе Бос)">

    <button onclick="addBook()">Қосу</button>
</div>

<script>
let books = JSON.parse(localStorage.getItem("books")) || [];

function save() {
    localStorage.setItem("books", JSON.stringify(books));
}

// ADMIN LOGIN
function openAdmin() {
    const pass = prompt("Пароль:");
    if(pass === "0101") {
        document.getElementById("admin").style.display="block";
    } else {
        alert("Қате!");
    }
}

// ADD BOOK
function addBook() {
    const name = document.getElementById("name").value;
    const img = document.getElementById("img").value;
    const user = document.getElementById("user").value || "Бос";

    books.push({
        name,
        img,
        takenBy:user,
        comments:[]
    });

    save();
    render();
}

// TOGGLE
function toggle(i) {
    const el = document.getElementById("d"+i);
    el.classList.toggle("active");
}

// COMMENT
function addComment(i) {
    const name = document.getElementById("n"+i).value;
    const text = document.getElementById("t"+i).value;

    if(!name || !text) return;

    books[i].comments.push({name,text});
    save();
    render();
}

// RENDER
function render() {
    const container = document.getElementById("books");
    container.innerHTML="";

    books.forEach((b,i)=>{

        const status = b.takenBy==="Бос" ? "✅ Бар" : "❌ Жоқ";

        const div = document.createElement("div");
        div.className="book";

        div.innerHTML=`
        <img src="${b.img}">
        <h3>${b.name}</h3>

        <button onclick="toggle(${i})">Қарау</button>

        <div class="detail" id="d${i}">
            <p>👤 Кім алды: ${b.takenBy}</p>
            <p>${status}</p>

            <h4>💬 Пікір</h4>
            <input id="n${i}" placeholder="Атың">
            <textarea id="t${i}"></textarea>
            <button onclick="addComment(${i})">Жазу</button>

            ${b.comments.map(c=>`
                <div class="comment">
                    <b>${c.name}</b>: ${c.text}
                </div>
            `).join("")}
        </div>
        `;

        container.appendChild(div);
    });
}

render();
</script>

</body>
</html>
