<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Кітапхана</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(180deg,#020024,#090979,#000);
    color: white;
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px;
}

.avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: purple;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* BOOK LIST */
#books {
    padding: 10px;
}

.book {
    background: rgba(255,255,255,0.05);
    margin: 10px 0;
    padding: 15px;
    border-radius: 10px;
}
</style>
</head>

<body>

<header>
    <h2>📚 Кітапхана</h2>
    <div class="avatar">R</div>
</header>

<div id="books"></div>

<script>
// 📚 КІТАПТАР ТІЗІМІ
const books = [
    {name:"Абай жолы", takenBy:"Асан"},
    {name:"Қан мен тер", takenBy:"Ерлан"},
    {name:"Көшпенділер", takenBy:"Бос"}
];

// 📌 ШЫҒАРУ
const container = document.getElementById("books");

books.forEach(book => {
    const div = document.createElement("div");
    div.className = "book";

    div.innerHTML = `
        <h3>${book.name}</h3>
        <p>Алған: ${book.takenBy}</p>
    `;

    container.appendChild(div);
});
</script>

</body>
</html>
